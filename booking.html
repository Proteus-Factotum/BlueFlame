<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f0f0f;
      --text: #f2f2f0;
      --muted: #b4b4af;
      --soft: #8d8d87;
      --underline: rgba(242, 242, 240, 0.5);
      --surface: #151515;
    }

    * {
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 56px 22px 64px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    main {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }

    h1,
    h2,
    p,
    ul,
    fieldset {
      margin: 0;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 2.7rem);
      line-height: 1.04;
      font-weight: 650;
      letter-spacing: -0.04em;
    }

    .intro {
      display: grid;
      gap: 10px;
    }

    .lede,
    .status,
    .empty,
    label,
    input,
    button {
      font-size: 1rem;
    }

    .lede,
    .status,
    .empty,
    .field-label,
    .hint,
    .back {
      color: var(--muted);
    }

    section {
      margin-top: 56px;
    }

    .options {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    .options:empty {
      display: none;
    }

    .option {
      display: block;
      cursor: pointer;
    }

    .option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .option-text {
      display: inline-block;
      color: var(--muted);
      padding-bottom: 4px;
      border-bottom: 1px solid transparent;
      transition: none;
    }

    .option input:checked + .option-text {
      color: var(--text);
      border-bottom-color: var(--underline);
    }

    .option input:focus-visible + .option-text,
    .option:hover .option-text {
      color: var(--text);
    }

    form {
      display: grid;
      gap: 18px;
      margin-top: 28px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field-label {
      font-size: 0.95rem;
    }

    input {
      width: 100%;
      padding: 0;
      border: 0;
      outline: none;
      color: var(--text);
      background: transparent;
      line-height: 1.6;
      border-bottom: 1px solid rgba(242, 242, 240, 0.18);
      border-radius: 0;
      padding-bottom: 8px;
    }

    input:focus {
      border-bottom-color: var(--underline);
    }

    button,
    .back {
      display: inline-block;
      width: fit-content;
      color: var(--text);
      background: transparent;
      border: 0;
      padding: 0 0 4px;
      text-decoration: none;
      font-weight: 500;
      letter-spacing: 0.01em;
      border-bottom: 1px solid var(--underline);
      cursor: pointer;
    }

    button:disabled {
      cursor: default;
      color: var(--soft);
      border-bottom-color: rgba(242, 242, 240, 0.18);
    }

    .status {
      min-height: 1.75em;
      margin-top: 14px;
    }

    .options-status {
      margin-top: 14px;
    }

    .success {
      color: var(--text);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 480px) {
      body {
        padding: 36px 18px 44px;
      }

      section {
        margin-top: 44px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="intro" aria-labelledby="booking-heading">
      <a class="back" href="index.html">Tilbage</a>
      <h1 id="booking-heading">Find et tidspunkt</h1>
      <p class="lede">Vælg det tidspunkt, der passer. Der er kun de muligheder, du kan se her.</p>
    </section>

    <section aria-labelledby="options-heading">
      <h2 id="options-heading" class="hidden">Muligheder</h2>
      <div id="setup-message" class="empty hidden"></div>
      <div id="options" class="options" role="radiogroup" aria-label="Ledige tidspunkter"></div>
      <p id="empty-message" class="empty hidden">Der er ingen ledige tider lige nu.</p>
      <p id="options-status" class="status options-status" aria-live="polite"></p>
    </section>

    <section aria-labelledby="form-heading">
      <h2 id="form-heading" class="hidden">Booking</h2>
      <form id="booking-form">
        <div class="field">
          <label class="field-label" for="name">Navn</label>
          <input id="name" name="name" type="text" autocomplete="name" required>
        </div>

        <div class="field">
          <label class="field-label" for="contact">Telefon eller email</label>
          <input id="contact" name="contact" type="text" autocomplete="email" required>
        </div>

        <button id="submit-button" type="submit" disabled>Book tidspunkt</button>
        <p class="hint">Når et tidspunkt er taget, forsvinder det fra listen.</p>
        <p id="status" class="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="booking-config.js"></script>
  <script>
    const config = window.BOOKING_CONFIG || {};
    const optionsEl = document.getElementById("options");
    const formEl = document.getElementById("booking-form");
    const submitButtonEl = document.getElementById("submit-button");
    const statusEl = document.getElementById("status");
    const optionsStatusEl = document.getElementById("options-status");
    const emptyMessageEl = document.getElementById("empty-message");
    const setupMessageEl = document.getElementById("setup-message");

    let selectedSlot = null;

    function isConfigured() {
      return (
        config.supabaseUrl &&
        config.supabaseAnonKey &&
        !config.supabaseUrl.includes("YOUR_PROJECT_REF") &&
        !config.supabaseAnonKey.includes("YOUR_SUPABASE_ANON_KEY")
      );
    }

    function getSlug() {
      const params = new URLSearchParams(window.location.search);
      return params.get("slug") || config.defaultSlug || "";
    }

    function setStatus(message, isSuccess) {
      statusEl.textContent = message;
      statusEl.className = isSuccess ? "status success" : "status";
    }

    function setOptionsStatus(message, isSuccess) {
      optionsStatusEl.textContent = message;
      optionsStatusEl.className = isSuccess ? "status options-status success" : "status options-status";
    }

    function formatSlot(isoString) {
      const formatter = new Intl.DateTimeFormat("da-DK", {
        weekday: "long",
        day: "numeric",
        month: "long",
        hour: "2-digit",
        minute: "2-digit",
        timeZone: "Europe/Copenhagen"
      });

      const output = formatter.format(new Date(isoString));
      return output.charAt(0).toUpperCase() + output.slice(1).replace(",", " kl.");
    }

    function renderOptions(slots) {
      optionsEl.innerHTML = "";
      emptyMessageEl.classList.toggle("hidden", slots.length !== 0);
      setOptionsStatus(slots.length ? slots.length + " tider ledige." : "", false);

      for (const slot of slots) {
        const labelEl = document.createElement("label");
        labelEl.className = "option";

        const inputEl = document.createElement("input");
        inputEl.type = "radio";
        inputEl.name = "slot";
        inputEl.value = slot.starts_at;
        inputEl.addEventListener("change", () => {
          selectedSlot = slot.starts_at;
          submitButtonEl.disabled = false;
          setStatus("", false);
        });

        const textEl = document.createElement("span");
        textEl.className = "option-text";
        textEl.textContent = formatSlot(slot.starts_at);

        labelEl.appendChild(inputEl);
        labelEl.appendChild(textEl);
        optionsEl.appendChild(labelEl);
      }
    }

    async function fetchOptions() {
      const slug = getSlug();

      if (!slug) {
        setupMessageEl.textContent = "Ingen booking-side er valgt endnu.";
        setupMessageEl.classList.remove("hidden");
        setOptionsStatus("", false);
        return;
      }

      if (!isConfigured()) {
        setupMessageEl.textContent = "Udfyld booking-config.js med dit Supabase-projekt for at hente tider.";
        setupMessageEl.classList.remove("hidden");
        setOptionsStatus("", false);
        return;
      }

      setupMessageEl.classList.add("hidden");
      setOptionsStatus("Henter ledige tider...", false);

      const response = await fetch(config.supabaseUrl + "/rest/v1/rpc/get_public_booking_options", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": config.supabaseAnonKey,
          "Authorization": "Bearer " + config.supabaseAnonKey
        },
        body: JSON.stringify({ target_slug: slug })
      });

      if (!response.ok) {
        throw new Error("Kunne ikke hente tider.");
      }

      const slots = await response.json();
      renderOptions(slots);
      setOptionsStatus(slots.length ? slots.length + " tider ledige." : "", false);
    }

    async function submitBooking(event) {
      event.preventDefault();

      if (!selectedSlot) {
        setStatus("Vælg et tidspunkt først.", false);
        return;
      }

      const slug = getSlug();
      const formData = new FormData(formEl);
      const name = String(formData.get("name") || "").trim();
      const contact = String(formData.get("contact") || "").trim();

      if (!name || !contact) {
        setStatus("Udfyld navn og kontakt.", false);
        return;
      }

      submitButtonEl.disabled = true;
      setStatus("Gemmer booking...", false);

      try {
        const response = await fetch(config.supabaseUrl + "/rest/v1/rpc/create_booking", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": config.supabaseAnonKey,
            "Authorization": "Bearer " + config.supabaseAnonKey
          },
          body: JSON.stringify({
            target_slug: slug,
            requested_starts_at: selectedSlot,
            guest_name: name,
            guest_contact: contact
          })
        });

        if (!response.ok) {
          const errorPayload = await response.json().catch(() => null);
          const message = errorPayload && errorPayload.message ? errorPayload.message : "Bookingen kunne ikke gennemfoeres.";
          throw new Error(message);
        }

        formEl.reset();
        selectedSlot = null;
        setStatus("Tidspunktet er booket.", true);
        await fetchOptions();
      } catch (error) {
        setStatus(error.message, false);
      } finally {
        submitButtonEl.disabled = selectedSlot === null;
      }
    }

    formEl.addEventListener("submit", submitBooking);
    fetchOptions().catch((error) => {
      setOptionsStatus(error.message, false);
    });
  </script>
</body>
</html>
